<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Semester-Lernportal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1916;
    --text2: #6b6960;
    --text3: #a09e97;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 0.5px solid var(--border2); padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 28px 32px; max-width: 820px; }

  /* Sidebar */
  .sidebar-title { font-size: 10px; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; padding: 0 8px; }
  .mod-btn { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border: none; border-radius: var(--radius); background: transparent; cursor: pointer; width: 100%; text-align: left; transition: background .12s; }
  .mod-btn:hover { background: var(--surface2); }
  .mod-btn.active { background: var(--surface2); }
  .mod-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .mod-name { font-size: 13px; color: var(--text); flex: 1; line-height: 1.3; }
  .mod-count { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* Header */
  .page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .page-dot { width: 10px; height: 10px; border-radius: 50%; }
  .page-title { font-size: 20px; font-weight: 500; color: var(--text); }
  .page-badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; }

  /* VL Cards */
  .vl-wrap { border: 0.5px solid var(--border2); border-radius: var(--radius-lg); background: var(--surface); overflow: hidden; margin-bottom: 8px; }
  .vl-top { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; transition: background .1s; }
  .vl-top:hover { background: var(--surface2); }
  .vl-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .vl-meta { flex: 1; min-width: 0; }
  .vl-titel { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .tags { display: flex; flex-wrap: wrap; gap: 0; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; margin: 2px 3px 2px 0; }
  .chevron { font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 3px; transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }

  /* Detail panel */
  .vl-detail { border-top: 0.5px solid var(--border); padding: 16px; }
  .vl-intro { font-size: 13px; line-height: 1.75; color: var(--text2); margin-bottom: 12px; }

  /* Sections */
  .sec-wrap { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 6px; }
  .sec-hdr { display: flex; align-items: center; gap: 8px; padding: 9px 12px; cursor: pointer; background: var(--surface2); transition: filter .1s; user-select: none; }
  .sec-hdr:hover { filter: brightness(.97); }
  .sec-nr { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; min-width: 18px; }
  .sec-titel { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .prio { font-size: 10px; padding: 1px 7px; border-radius: 20px; }
  .pk { background: #fde8e8; color: #9b2c2c; }
  .ph { background: #fef3c7; color: #92400e; }
  .pm { background: #dbeafe; color: #1e40af; }
  .sec-body { padding: 13px 14px; border-top: 0.5px solid var(--border); font-size: 13px; line-height: 1.8; color: var(--text); }
  .lz { font-size: 12px; color: var(--text2); border-left: 2px solid var(--border2); padding-left: 9px; margin-bottom: 10px; line-height: 1.6; font-style: italic; }

  /* Add buttons */
  .add-vl-btn { width: 100%; padding: 10px; border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); background: transparent; color: var(--text3); cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; transition: all .12s; margin-top: 4px; }
  .add-vl-btn:hover { background: var(--surface); color: var(--text2); border-color: var(--border2); }

  /* Empty state */
  .empty { border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 3rem; text-align: center; }
  .empty p { font-size: 13px; color: var(--text3); margin-bottom: 14px; }
  .btn-primary { padding: 8px 20px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text2); transition: all .12s; }
  .btn-primary:hover { background: var(--surface2); }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 480px; max-width: calc(100vw - 32px); border: 0.5px solid var(--border2); }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; margin-top: 12px; }
  .modal input, .modal textarea { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; }
  .modal input:focus, .modal textarea:focus { border-color: var(--border2); box-shadow: 0 0 0 2px rgba(0,0,0,.06); }
  .modal textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .btn-cancel { padding: 7px 16px; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text2); }
  .btn-save { padding: 7px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--text); color: white; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .btn-save:hover { opacity: .85; }
  .btn-danger { padding: 7px 16px; border: 0.5px solid #fca5a5; border-radius: var(--radius); background: transparent; color: #b91c1c; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; margin-right: auto; }

  /* Hint */
  .hint { font-size: 11px; color: var(--text3); margin-top: 6px; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 6px; padding: 10px 16px; border-bottom: 0.5px solid var(--border2); background: var(--surface); }
  .toolbar-title { font-size: 12px; font-weight: 500; color: var(--text2); flex: 1; letter-spacing: .01em; }
  .tb-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 11px; font-family: 'DM Sans', sans-serif; color: var(--text2); transition: all .12s; white-space: nowrap; }
  .tb-btn:hover { background: var(--surface2); }
  .tb-btn.import { color: #185FA5; border-color: #B5D4F4; }
  .tb-btn.import:hover { background: #E6F1FB; }
  .tb-sep { width: 0.5px; height: 18px; background: var(--border2); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: white; font-size: 12px; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: all .3s; z-index: 200; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; flex-direction: row; flex-wrap: wrap; padding: 12px; border-right: none; border-bottom: 0.5px solid var(--border2); overflow-x: auto; }
    .sidebar-title { display: none; }
    .mod-btn { width: auto; padding: 6px 10px; }
    .mod-name { font-size: 12px; }
    .main { padding: 16px; }
    .toolbar { flex-wrap: wrap; gap: 4px; }
    .toolbar-title { width: 100%; margin-bottom: 2px; }
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <span class="toolbar-title">Semester-Lernportal</span>
  <button class="tb-btn" onclick="exportData()" title="Alle Daten als JSON-Datei herunterladen">
    ↓ Export
  </button>
  <div class="tb-sep"></div>
  <label class="tb-btn import" title="JSON-Datei importieren" style="cursor:pointer">
    ↑ Import
    <input type="file" accept=".json" style="display:none" onchange="importData(event)">
  </label>
</div>

<div class="app">
  <nav class="sidebar">
    <p class="sidebar-title">MEINE MODULE</p>
    <div id="sb"></div>
  </nav>
  <main class="main" id="pn"></main>
</div>

<div class="toast" id="toast"></div>

<!-- Modal: Vorlesung hinzufügen -->
<div class="modal-backdrop" id="modal-vl">
  <div class="modal">
    <h3 id="modal-vl-title">Neue Vorlesung</h3>
    <label>Titel der Vorlesung</label>
    <input id="vl-titel-input" placeholder="z.B. Grundlagen & VGR" />
    <label>Schlagwörter <span class="hint">(kommagetrennt)</span></label>
    <input id="vl-tags-input" placeholder="z.B. BIP, Inflation, Reallohn" />
    <label>Kurze Einleitung <span class="hint">(optional)</span></label>
    <textarea id="vl-intro-input" placeholder="1–2 Sätze, worum es in der VL geht..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-vl')">Abbrechen</button>
      <button class="btn-save" onclick="saveVL()">Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Abschnitt hinzufügen -->
<div class="modal-backdrop" id="modal-sec">
  <div class="modal">
    <h3>Abschnitt hinzufügen</h3>
    <label>Titel</label>
    <input id="sec-titel-input" placeholder="z.B. Nominales vs. Reales BIP" />
    <label>Priorität</label>
    <select id="sec-prio-input" style="width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)">
      <option value="">— keine —</option>
      <option value="k">Kritisch</option>
      <option value="h">Hoch</option>
      <option value="m">Mittel</option>
    </select>
    <label>Lernziel <span class="hint">(optional, "Ich kann...")</span></label>
    <input id="sec-lz-input" placeholder="...den BIP-Deflator berechnen." />
    <label>Detaillierte Erklärung</label>
    <textarea id="sec-text-input" style="min-height:120px" placeholder="Ausführliche Zusammenfassung, Formeln, Beispiele..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-sec')">Abbrechen</button>
      <button class="btn-save" onclick="saveSEC()">Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Vorlesung löschen -->
<div class="modal-backdrop" id="modal-del">
  <div class="modal">
    <h3>Vorlesung löschen?</h3>
    <p style="font-size:13px;color:var(--text2);margin-top:8px">Diese Aktion kann nicht rückgängig gemacht werden.</p>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-del')">Abbrechen</button>
      <button class="btn-danger" style="margin-right:auto" onclick="confirmDelVL()">Löschen</button>
    </div>
  </div>
</div>

<script>
const MODS_DEF = [
  {id:'mikro', label:'Mikroökonomik',     c:'#185FA5', bg:'#E6F1FB', tc:'#0C447C'},
  {id:'makro', label:'Makroökonomik',     c:'#3B6D11', bg:'#EAF3DE', tc:'#27500A'},
  {id:'irw',   label:'Int. Rechnungsw.', c:'#854F0B', bg:'#FAEEDA', tc:'#633806'},
  {id:'stat',  label:'Statistik 2',       c:'#534AB7', bg:'#EEEDFE', tc:'#3C3489'},
  {id:'recht', label:'WiPriR 2',          c:'#993C1D', bg:'#FAECE7', tc:'#712B13'},
  {id:'steuer',label:'Betr. Steuerlehre', c:'#0F6E56', bg:'#E1F5EE', tc:'#085041'}
];

// --- State from localStorage ---
function loadData() {
  try { return JSON.parse(localStorage.getItem('lernportal_v1')) || {}; } catch(e) { return {}; }
}
function saveData() { localStorage.setItem('lernportal_v1', JSON.stringify(state)); }

let state = loadData();
MODS_DEF.forEach(m => { if (!state[m.id]) state[m.id] = []; });

let cur = 'mikro', openVL = new Set(), openSEC = new Set();
let _modalVLmod = null, _modalVLid = null, _modalSECmod = null, _modalSECvl = null, _delMod = null, _delVL = null;

// --- Helpers ---
function uid() { return Math.random().toString(36).slice(2,9); }
function prioBadge(p) {
  if (!p) return '';
  const m = {k:['Kritisch','pk'], h:['Hoch','ph'], m:['Mittel','pm']};
  const [l,c] = m[p] || [];
  return l ? `<span class="prio ${c}">${l}</span>` : '';
}

// --- Render ---
function renderSB() {
  document.getElementById('sb').innerHTML = MODS_DEF.map(m => {
    const vls = state[m.id] || [];
    return `<button class="mod-btn${m.id===cur?' active':''}" onclick="go('${m.id}')">
      <span class="mod-dot" style="background:${m.c}"></span>
      <span class="mod-name">${m.label}</span>
      ${vls.length ? `<span class="mod-count">${vls.length}</span>` : ''}
    </button>`;
  }).join('');
}

function renderPN() {
  const md = MODS_DEF.find(x => x.id === cur);
  const vls = state[cur] || [];
  let h = `<div class="page-header">
    <span class="page-dot" style="background:${md.c}"></span>
    <span class="page-title">${md.label}</span>
    ${vls.length ? `<span class="page-badge" style="background:${md.bg};color:${md.tc}">${vls.length} VL</span>` : ''}
  </div>`;

  if (!vls.length) {
    h += `<div class="empty">
      <p>Noch keine Vorlesungen – füge deine erste hinzu.</p>
      <button class="btn-primary" onclick="openAddVL('${cur}')">+ Vorlesung hinzufügen</button>
    </div>`;
  } else {
    vls.forEach(v => {
      const vlOpen = openVL.has(v.id);
      h += `<div class="vl-wrap">
        <div class="vl-top" onclick="togVL('${v.id}')">
          <span class="vl-badge" style="background:${md.bg};color:${md.tc}">VL ${v.nr}</span>
          <div class="vl-meta">
            <div class="vl-titel">${v.titel}</div>
            <div class="tags">${(v.tags||[]).map(t=>`<span class="tag" style="background:${md.bg};color:${md.tc}">${t}</span>`).join('')}</div>
          </div>
          <span class="chevron${vlOpen?' open':''}">▼</span>
        </div>`;

      if (vlOpen) {
        h += `<div class="vl-detail">`;
        if (v.intro) h += `<p class="vl-intro">${v.intro}</p>`;

        (v.secs || []).forEach(s => {
          const sOpen = openSEC.has(s.id);
          h += `<div class="sec-wrap">
            <div class="sec-hdr" onclick="togSEC('${s.id}')">
              <span class="sec-nr">${s.nr}</span>
              <span class="sec-titel">${s.titel}</span>
              ${prioBadge(s.prio)}
              <span class="chevron${sOpen?' open':''}" style="margin-top:0">▼</span>
            </div>`;
          if (sOpen) {
            h += `<div class="sec-body">`;
            if (s.lz) h += `<div class="lz">Lernziel: ${s.lz}</div>`;
            h += `<div>${s.text}</div></div>`;
          }
          h += `</div>`;
        });

        h += `<button class="add-vl-btn" style="margin-top:8px;border-style:dashed" onclick="openAddSEC('${cur}','${v.id}')">+ Abschnitt hinzufügen</button>`;
        h += `<button class="add-vl-btn" style="color:#b91c1c;border-color:#fca5a5;margin-top:4px" onclick="openDelVL('${cur}','${v.id}')">Vorlesung löschen</button>`;
        h += `</div>`;
      }
      h += `</div>`;
    });
    h += `<button class="add-vl-btn" onclick="openAddVL('${cur}')">+ Vorlesung ${vls.length+1} hinzufügen</button>`;
  }
  document.getElementById('pn').innerHTML = h;
}

function render() { renderSB(); renderPN(); }

// --- Navigation ---
function go(id) { cur = id; openVL = new Set(); openSEC = new Set(); render(); }
function togVL(id) { openVL.has(id) ? openVL.delete(id) : openVL.add(id); renderPN(); }
function togSEC(id) { openSEC.has(id) ? openSEC.delete(id) : openSEC.add(id); renderPN(); }

// --- Modals ---
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openAddVL(modId) {
  _modalVLmod = modId; _modalVLid = null;
  document.getElementById('modal-vl-title').textContent = 'Neue Vorlesung';
  document.getElementById('vl-titel-input').value = '';
  document.getElementById('vl-tags-input').value = '';
  document.getElementById('vl-intro-input').value = '';
  openModal('modal-vl');
}

function saveVL() {
  const titel = document.getElementById('vl-titel-input').value.trim();
  if (!titel) return;
  const raw = document.getElementById('vl-tags-input').value;
  const tags = raw.split(',').map(t=>t.trim()).filter(Boolean);
  const intro = document.getElementById('vl-intro-input').value.trim();
  const vls = state[_modalVLmod];
  vls.push({ id: uid(), nr: vls.length+1, titel, tags, intro, secs: [] });
  saveData();
  closeModal('modal-vl');
  openVL.add(vls[vls.length-1].id);
  render();
}

function openAddSEC(modId, vlId) {
  _modalSECmod = modId; _modalSECvl = vlId;
  document.getElementById('sec-titel-input').value = '';
  document.getElementById('sec-prio-input').value = '';
  document.getElementById('sec-lz-input').value = '';
  document.getElementById('sec-text-input').value = '';
  openModal('modal-sec');
}

function saveSEC() {
  const titel = document.getElementById('sec-titel-input').value.trim();
  if (!titel) return;
  const prio = document.getElementById('sec-prio-input').value;
  const lz = document.getElementById('sec-lz-input').value.trim();
  const text = document.getElementById('sec-text-input').value.trim().replace(/\n/g,'<br>');
  const vl = state[_modalSECmod].find(v => v.id === _modalSECvl);
  const sec = { id: uid(), nr: vl.secs.length+1, titel, prio, lz, text };
  vl.secs.push(sec);
  saveData();
  closeModal('modal-sec');
  openSEC.add(sec.id);
  renderPN();
}

function openDelVL(modId, vlId) {
  _delMod = modId; _delVL = vlId;
  openModal('modal-del');
}

function confirmDelVL() {
  state[_delMod] = state[_delMod].filter(v => v.id !== _delVL);
  state[_delMod].forEach((v,i) => v.nr = i+1);
  saveData();
  closeModal('modal-del');
  openVL.delete(_delVL);
  render();
}

// Close modals on backdrop click
['modal-vl','modal-sec','modal-del'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal(id);
  });
});

// --- Toast ---
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// --- Export ---
function exportData() {
  const payload = { version: 1, exported: new Date().toISOString(), data: state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'lernportal-backup-' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export erfolgreich gespeichert');
}

// --- Import ---
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const incoming = parsed.data || parsed;
      let merged = false;
      MODS_DEF.forEach(m => {
        if (Array.isArray(incoming[m.id])) {
          state[m.id] = incoming[m.id];
          merged = true;
        }
      });
      if (!merged) { toast('Ungueltige Datei – kein Import moeglich'); return; }
      saveData();
      openVL = new Set(); openSEC = new Set();
      render();
      toast('Daten erfolgreich importiert');
    } catch(err) {
      toast('Fehler beim Lesen der Datei');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

render();
</script>
</body>
</html>
