<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernportal</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--border3:rgba(0,0,0,.2);
  --text:#18170f;--text2:#5c5a52;--text3:#9e9c93;
  --r:10px;--rl:14px;--rxl:18px;--shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text)}

.shell{display:grid;grid-template-rows:44px 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--surface);border-bottom:.5px solid var(--border2);z-index:50}
.brand{font-size:13px;font-weight:500;flex:1;letter-spacing:-.01em}
.saved{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.sep{width:.5px;height:16px;background:var(--border2)}
.tbtn{display:flex;align-items:center;gap:4px;padding:4px 11px;border:.5px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;font-size:11px;font-family:'Instrument Sans',sans-serif;color:var(--text2);transition:all .12s;white-space:nowrap}
.tbtn:hover{background:var(--surface2);border-color:var(--border3)}

.content{display:grid;grid-template-columns:230px 1fr;overflow:hidden}

.sidebar{background:var(--surface);border-right:.5px solid var(--border2);padding:18px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-label{font-size:10px;letter-spacing:.08em;color:var(--text3);margin-bottom:6px;padding:0 8px}
.mod-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border:none;border-radius:var(--r);background:transparent;cursor:pointer;width:100%;text-align:left;transition:background .1s;position:relative}
.mod-btn:hover,.mod-btn.active{background:var(--surface2)}
.mod-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mod-name{font-size:12.5px;color:var(--text);flex:1;line-height:1.3}
.mod-count{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.sb-edit{opacity:0;font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0;transition:opacity .15s;line-height:1}
.mod-btn:hover .sb-edit{opacity:1}
.sb-edit:hover{color:var(--text2);background:var(--surface3)}
.sb-add{display:flex;align-items:center;gap:7px;padding:7px 10px;border:none;border-radius:var(--r);background:transparent;cursor:pointer;width:100%;text-align:left;font-size:12px;color:var(--text3);font-family:'Instrument Sans',sans-serif;margin-top:6px;border-top:.5px solid var(--border);padding-top:10px;transition:all .1s}
.sb-add:hover{color:var(--text2)}

.main{overflow-y:auto;padding:28px 32px}
.page-hdr{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.page-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.page-title{font-size:19px;font-weight:500;letter-spacing:-.02em}
.page-badge{font-size:11px;padding:2px 9px;border-radius:20px}
.page-edit-btn{font-size:11px;padding:3px 10px;border:.5px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--text3);font-family:'Instrument Sans',sans-serif;transition:all .12s;margin-left:auto}
.page-edit-btn:hover{background:var(--surface2);color:var(--text2)}

.vl-card{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow)}
.vl-top{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s}
.vl-top:hover{background:var(--surface2)}
.vl-nr{font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;margin-top:2px;font-family:'DM Mono',monospace}
.vl-meta{flex:1;min-width:0}
.vl-title{font-size:13.5px;font-weight:500;margin-bottom:6px}
.tags{display:flex;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;margin:2px 3px 2px 0}
.chev{font-size:9px;color:var(--text3);margin-top:4px;flex-shrink:0;transition:transform .2s}
.chev.open{transform:rotate(180deg)}

.vl-detail{border-top:.5px solid var(--border);padding:16px}
.vl-intro{font-size:13px;line-height:1.75;color:var(--text2);margin-bottom:14px;font-style:italic}

.sec{border:.5px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:6px}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;background:var(--surface2);user-select:none;transition:background .1s}
.sec-hdr:hover{background:var(--surface3)}
.sec-nr{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;min-width:16px}
.sec-title{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.prio{font-size:10px;padding:1px 7px;border-radius:20px}
.pk{background:#fde8e8;color:#9b2c2c}
.ph{background:#fef3c7;color:#92400e}
.pm{background:#dbeafe;color:#1e40af}
.sec-body{padding:14px;border-top:.5px solid var(--border)}
.lz{font-size:12px;color:var(--text2);border-left:2px solid var(--surface3);padding-left:9px;margin-bottom:11px;line-height:1.6;font-style:italic}
.sec-text{font-size:13px;line-height:1.85;color:var(--text)}

.action-row{display:flex;gap:6px;margin-top:10px}
.act-btn{flex:1;padding:8px;border:.5px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);cursor:pointer;font-size:11.5px;font-family:'Instrument Sans',sans-serif;transition:all .12s}
.act-btn:hover{background:var(--surface2);color:var(--text2);border-color:var(--border3);border-style:solid}
.act-btn.danger{color:#b91c1c;border-color:#fca5a5}
.act-btn.danger:hover{background:#fde8e8;border-style:solid}

.empty{border:.5px dashed var(--border2);border-radius:var(--rl);padding:3rem;text-align:center}
.empty p{font-size:13px;color:var(--text3);margin-bottom:14px}
.btn-add{padding:7px 18px;border:.5px solid var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;font-size:12.5px;font-family:'Instrument Sans',sans-serif;color:var(--text2);transition:all .12s}
.btn-add:hover{background:var(--surface2)}

.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:7px}
.cswatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.cswatch.sel{border-color:var(--text);transform:scale(1.18)}

.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
.backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rxl);padding:22px;width:480px;max-width:calc(100vw - 24px);border:.5px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.12);max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;margin-bottom:14px}
.modal label{font-size:11.5px;color:var(--text2);display:block;margin-bottom:4px;margin-top:11px}
.modal input,.modal textarea,.modal select{width:100%;padding:7px 10px;border:.5px solid var(--border2);border-radius:var(--r);font-size:12.5px;font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);outline:none}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,.08)}
.modal textarea{resize:vertical;min-height:80px;line-height:1.6}
.modal-footer{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;flex-wrap:wrap}
.btn-cancel{padding:6px 14px;border:.5px solid var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;font-size:12.5px;font-family:'Instrument Sans',sans-serif;color:var(--text2)}
.btn-save{padding:6px 14px;border:none;border-radius:var(--r);background:var(--text);color:white;cursor:pointer;font-size:12.5px;font-family:'Instrument Sans',sans-serif}
.btn-save:hover{opacity:.85}
.btn-del{padding:6px 14px;border:.5px solid #fca5a5;border-radius:var(--r);background:transparent;color:#b91c1c;cursor:pointer;font-size:12.5px;font-family:'Instrument Sans',sans-serif;margin-right:auto}
.hint{font-size:10.5px;color:var(--text3)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--text);color:white;font-size:12px;padding:7px 18px;border-radius:20px;opacity:0;transition:all .25s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .content{grid-template-columns:1fr}
  .sidebar{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;height:auto;border-right:none;border-bottom:.5px solid var(--border2);padding:10px;gap:4px}
  .sb-label,.sb-add{display:none}
  .mod-btn{width:auto;flex-shrink:0;padding:5px 10px}
  .mod-name{font-size:12px}
  .mod-count,.sb-edit{display:none}
  .main{padding:16px}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <span class="brand">Lernportal</span>
    <span class="saved" id="ts"></span>
    <div class="sep"></div>
    <button class="tbtn" onclick="exportData()">↓ Export</button>
    <label class="tbtn" style="cursor:pointer">↑ Import<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
  </header>
  <div class="content">
    <nav class="sidebar">
      <p class="sb-label">MODULE</p>
      <div id="sb"></div>
      <button class="sb-add" onclick="openModModal(null)">+ Modul hinzufügen</button>
    </nav>
    <main class="main" id="pn"></main>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modul Modal -->
<div class="backdrop" id="m-mod">
  <div class="modal">
    <h3 id="m-mod-h">Neues Modul</h3>
    <label>Name</label>
    <input id="mod-name" placeholder="z.B. Investition & Finanzierung"/>
    <label>Kürzel <span class="hint">(erscheint als Badge, max. 6 Zeichen)</span></label>
    <input id="mod-short" placeholder="z.B. InFi" maxlength="6"/>
    <label>Farbe</label>
    <div class="color-grid" id="cgrid"></div>
    <div class="modal-footer">
      <button class="btn-del" id="mod-del-btn" style="display:none" onclick="reqDelMod()">Modul löschen</button>
      <button class="btn-cancel" onclick="closeM('m-mod')">Abbrechen</button>
      <button class="btn-save" onclick="saveMod()">Speichern</button>
    </div>
  </div>
</div>

<!-- Modul löschen bestätigen -->
<div class="backdrop" id="m-del-mod">
  <div class="modal">
    <h3>Modul löschen?</h3>
    <p style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6">Alle Vorlesungen und Abschnitte dieses Moduls werden unwiderruflich gelöscht.</p>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeM('m-del-mod')">Abbrechen</button>
      <button class="btn-del" onclick="doDelMod()">Endgültig löschen</button>
    </div>
  </div>
</div>

<!-- VL Modal -->
<div class="backdrop" id="m-vl">
  <div class="modal">
    <h3>Neue Vorlesung</h3>
    <label>Titel</label>
    <input id="vl-titel" placeholder="z.B. Grundlagen & Marktmodelle"/>
    <label>Schlagwörter <span class="hint">(kommagetrennt)</span></label>
    <input id="vl-tags" placeholder="z.B. Angebot, Nachfrage, Gleichgewicht"/>
    <label>Kurze Einleitung <span class="hint">(optional)</span></label>
    <textarea id="vl-intro" placeholder="Worum geht es in dieser Vorlesung?"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeM('m-vl')">Abbrechen</button>
      <button class="btn-save" onclick="saveVL()">Speichern</button>
    </div>
  </div>
</div>

<!-- Abschnitt Modal -->
<div class="backdrop" id="m-sec">
  <div class="modal">
    <h3>Abschnitt hinzufügen</h3>
    <label>Titel</label>
    <input id="sec-titel" placeholder="z.B. Indifferenzkurven"/>
    <label>Priorität</label>
    <select id="sec-prio">
      <option value="">— keine —</option>
      <option value="k">Kritisch</option>
      <option value="h">Hoch</option>
      <option value="m">Mittel</option>
    </select>
    <label>Lernziel <span class="hint">("Ich kann...")</span></label>
    <input id="sec-lz" placeholder="...Indifferenzkurven zeichnen und interpretieren."/>
    <label>Inhalt / Zusammenfassung</label>
    <textarea id="sec-text" style="min-height:120px" placeholder="Ausführliche Erklärung, Formeln, Beispiele..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeM('m-sec')">Abbrechen</button>
      <button class="btn-save" onclick="saveSEC()">Speichern</button>
    </div>
  </div>
</div>

<!-- VL löschen -->
<div class="backdrop" id="m-del-vl">
  <div class="modal">
    <h3>Vorlesung löschen?</h3>
    <p style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6">Diese Aktion kann nicht rückgängig gemacht werden.</p>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeM('m-del-vl')">Abbrechen</button>
      <button class="btn-del" onclick="doDelVL()">Endgültig löschen</button>
    </div>
  </div>
</div>

<script>
const COLORS=[
  {c:'#185FA5',bg:'#E6F1FB',tc:'#0C447C'},
  {c:'#3B6D11',bg:'#EAF3DE',tc:'#27500A'},
  {c:'#854F0B',bg:'#FAEEDA',tc:'#633806'},
  {c:'#534AB7',bg:'#EEEDFE',tc:'#3C3489'},
  {c:'#993C1D',bg:'#FAECE7',tc:'#712B13'},
  {c:'#0F6E56',bg:'#E1F5EE',tc:'#085041'},
  {c:'#7C3A7A',bg:'#F5E8F5',tc:'#5B1F5B'},
  {c:'#B02D5A',bg:'#FAE6ED',tc:'#7A1A3B'},
  {c:'#2D7D8F',bg:'#E0F4F7',tc:'#164D57'},
  {c:'#9B7800',bg:'#FBF3DC',tc:'#6B5200'},
  {c:'#C0392B',bg:'#FDECEA',tc:'#922B21'},
  {c:'#5C5A52',bg:'#F0EFE9',tc:'#3A3830'},
];

// ── State ──
function load(){try{return JSON.parse(localStorage.getItem('lp_v3'))||{};}catch(e){return {};}}
function save(){
  localStorage.setItem('lp_v3',JSON.stringify(S));
  const n=new Date();
  document.getElementById('ts').textContent='Gespeichert '+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

const DEFAULT_MODS=[
  {id:'mikro',label:'Mikroökonomik',short:'Mikro',ci:0},
  {id:'makro',label:'Makroökonomik',short:'Makro',ci:1},
  {id:'irw',label:'Int. Rechnungsw.',short:'IRW',ci:2},
  {id:'stat',label:'Statistik 2',short:'Stat',ci:3},
  {id:'recht',label:'WiPriR 2',short:'Recht',ci:4},
  {id:'steuer',label:'Betr. Steuerlehre',short:'Steuer',ci:5},
];

let S=load();
if(!S.__mods){
  S.__mods=DEFAULT_MODS.map(m=>({...m}));
  DEFAULT_MODS.forEach(m=>{if(!S[m.id])S[m.id]=[];});
}
S.__mods.forEach(m=>{if(!S[m.id])S[m.id]=[];});

let cur=S.__mods[0]?.id||'';
let openVL=new Set(),openSEC=new Set();
let _vMod,_sMod,_sVL,_dMod,_dVL,_eMod=null,_sci=0;
const uid=()=>Math.random().toString(36).slice(2,9);
const col=i=>COLORS[i%COLORS.length];
const getMod=id=>S.__mods.find(m=>m.id===id);

function prio(p){const m={k:['Kritisch','pk'],h:['Hoch','ph'],m:['Mittel','pm']};const[l,c]=m[p]||[];return l?`<span class="prio ${c}">${l}</span>`:'';}

// ── Render ──
function renderSB(){
  document.getElementById('sb').innerHTML=S.__mods.map(m=>{
    const cl=col(m.ci);
    const n=(S[m.id]||[]).length;
    return `<button class="mod-btn${m.id===cur?' active':''}" onclick="go('${m.id}')">
      <span class="mod-dot" style="background:${cl.c}"></span>
      <span class="mod-name">${m.label}</span>
      ${n?`<span class="mod-count">${n}</span>`:''}
      <button class="sb-edit" onclick="event.stopPropagation();openModModal('${m.id}')" title="Bearbeiten">✎</button>
    </button>`;
  }).join('');
}

function renderPN(){
  const md=getMod(cur);
  if(!md){document.getElementById('pn').innerHTML='<p style="color:var(--text3);font-size:13px;padding:2rem">Kein Modul ausgewählt.</p>';return;}
  const cl=col(md.ci);
  const vls=S[cur]||[];
  let h=`<div class="page-hdr">
    <span class="page-dot" style="background:${cl.c}"></span>
    <span class="page-title">${md.label}</span>
    ${vls.length?`<span class="page-badge" style="background:${cl.bg};color:${cl.tc}">${vls.length} VL</span>`:''}
    <button class="page-edit-btn" onclick="openModModal('${cur}')">✎ Bearbeiten</button>
  </div>`;

  if(!vls.length){
    h+=`<div class="empty"><p>Noch keine Vorlesungen.</p>
      <button class="btn-add" onclick="openAddVL('${cur}')">+ Erste Vorlesung hinzufügen</button>
    </div>`;
  } else {
    vls.forEach(v=>{
      const vo=openVL.has(v.id);
      h+=`<div class="vl-card">
        <div class="vl-top" onclick="togVL('${v.id}')">
          <span class="vl-nr" style="background:${cl.bg};color:${cl.tc}">VL ${v.nr}</span>
          <div class="vl-meta">
            <div class="vl-title">${v.titel}</div>
            <div class="tags">${(v.tags||[]).map(t=>`<span class="tag" style="background:${cl.bg};color:${cl.tc}">${t}</span>`).join('')}</div>
          </div>
          <span class="chev${vo?' open':''}">▼</span>
        </div>`;
      if(vo){
        h+=`<div class="vl-detail">`;
        if(v.intro)h+=`<p class="vl-intro">${v.intro}</p>`;
        (v.secs||[]).forEach(s=>{
          const so=openSEC.has(s.id);
          h+=`<div class="sec">
            <div class="sec-hdr" onclick="togSEC('${s.id}')">
              <span class="sec-nr">${s.nr}</span>
              <span class="sec-title">${s.titel}</span>
              ${prio(s.prio)}
              <span class="chev${so?' open':''}">▼</span>
            </div>`;
          if(so){
            h+=`<div class="sec-body">`;
            if(s.lz)h+=`<div class="lz">Lernziel: ${s.lz}</div>`;
            if(s.text)h+=`<div class="sec-text">${s.text}</div>`;
            h+=`</div>`;
          }
          h+=`</div>`;
        });
        h+=`<div class="action-row">
          <button class="act-btn" onclick="openAddSEC('${cur}','${v.id}')">+ Abschnitt</button>
          <button class="act-btn danger" onclick="openDelVL('${cur}','${v.id}')">VL löschen</button>
        </div></div>`;
      }
      h+=`</div>`;
    });
    h+=`<button class="btn-add" style="width:100%;margin-top:4px;border:.5px dashed var(--border2);border-radius:var(--rl);padding:10px" onclick="openAddVL('${cur}')">+ Vorlesung ${vls.length+1} hinzufügen</button>`;
  }
  document.getElementById('pn').innerHTML=h;
}

function render(){renderSB();renderPN();}
function go(id){cur=id;openVL=new Set();openSEC=new Set();render();}
function togVL(id){openVL.has(id)?openVL.delete(id):openVL.add(id);renderPN();}
function togSEC(id){openSEC.has(id)?openSEC.delete(id):openSEC.add(id);renderPN();}

// ── Modals ──
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.backdrop').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)closeM(el.id);});
});

// ── Module Modal ──
function buildGrid(si){
  document.getElementById('cgrid').innerHTML=COLORS.map((c,i)=>
    `<div class="cswatch${i===si?' sel':''}" style="background:${c.c}" onclick="selColor(${i})"></div>`
  ).join('');
}
function selColor(i){_sci=i;buildGrid(i);}

function openModModal(id){
  _eMod=id;
  if(id){
    const md=getMod(id);
    _sci=md.ci;
    document.getElementById('m-mod-h').textContent='Modul bearbeiten';
    document.getElementById('mod-name').value=md.label;
    document.getElementById('mod-short').value=md.short||'';
    document.getElementById('mod-del-btn').style.display='inline-flex';
  } else {
    _sci=S.__mods.length%COLORS.length;
    document.getElementById('m-mod-h').textContent='Neues Modul';
    document.getElementById('mod-name').value='';
    document.getElementById('mod-short').value='';
    document.getElementById('mod-del-btn').style.display='none';
  }
  buildGrid(_sci);
  openM('m-mod');
}

function saveMod(){
  const label=document.getElementById('mod-name').value.trim();
  if(!label)return;
  const short=document.getElementById('mod-short').value.trim()||label.slice(0,5);
  if(_eMod){
    const md=getMod(_eMod);
    md.label=label;md.short=short;md.ci=_sci;
  } else {
    const id='mod_'+uid();
    S.__mods.push({id,label,short,ci:_sci});
    S[id]=[];
    cur=id;
  }
  save();closeM('m-mod');render();
}

function reqDelMod(){closeM('m-mod');openM('m-del-mod');}
function doDelMod(){
  if(!_eMod)return;
  delete S[_eMod];
  S.__mods=S.__mods.filter(m=>m.id!==_eMod);
  if(cur===_eMod)cur=S.__mods[0]?.id||'';
  save();closeM('m-del-mod');render();
}

// ── VL ──
function openAddVL(modId){
  _vMod=modId;
  ['vl-titel','vl-tags','vl-intro'].forEach(id=>document.getElementById(id).value='');
  openM('m-vl');
}
function saveVL(){
  const titel=document.getElementById('vl-titel').value.trim();
  if(!titel)return;
  const tags=document.getElementById('vl-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const intro=document.getElementById('vl-intro').value.trim();
  const vls=S[_vMod];
  const v={id:uid(),nr:vls.length+1,titel,tags,intro,secs:[]};
  vls.push(v);save();openVL.add(v.id);closeM('m-vl');render();
}

// ── Section ──
function openAddSEC(modId,vlId){
  _sMod=modId;_sVL=vlId;
  ['sec-titel','sec-lz','sec-text'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sec-prio').value='';
  openM('m-sec');
}
function saveSEC(){
  const titel=document.getElementById('sec-titel').value.trim();
  if(!titel)return;
  const prio=document.getElementById('sec-prio').value;
  const lz=document.getElementById('sec-lz').value.trim();
  const text=document.getElementById('sec-text').value.trim().replace(/\n/g,'<br>');
  const vl=S[_sMod].find(v=>v.id===_sVL);
  const s={id:uid(),nr:vl.secs.length+1,titel,prio,lz,text};
  vl.secs.push(s);save();openSEC.add(s.id);closeM('m-sec');renderPN();
}

// ── Delete VL ──
function openDelVL(modId,vlId){_dMod=modId;_dVL=vlId;openM('m-del-vl');}
function doDelVL(){
  S[_dMod]=S[_dMod].filter(v=>v.id!==_dVL);
  S[_dMod].forEach((v,i)=>v.nr=i+1);
  save();openVL.delete(_dVL);closeM('m-del-vl');render();
}

// ── Toast ──
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

// ── Export/Import ──
function exportData(){
  const blob=new Blob([JSON.stringify({version:3,exported:new Date().toISOString(),data:S},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='lernportal-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);toast('Export heruntergeladen');
}

function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const inc=parsed.data||parsed;
      if(!inc.__mods){toast('Ungültige Datei');return;}
      Object.assign(S,inc);
      S.__mods.forEach(m=>{if(!S[m.id])S[m.id]=[];});
      cur=S.__mods[0]?.id||'';
      save();openVL=new Set();openSEC=new Set();render();toast('Import erfolgreich');
    }catch(e){toast('Fehler beim Lesen');}
  };
  reader.readAsText(file);event.target.value='';
}

render();
</script>
